<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Courses & Préférences</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2e7d5b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Courses" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" href="icons/icon-192.png" />

<!-- Polices du mode confort visuel (voir css/style.css, bloc :root[data-a11y="on"]) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">

  <!-- =================================================================
       Écran de chargement initial (le temps de vérifier la session)
       ================================================================= -->
  <div v-if="view === 'loading'" class="loading-screen">Chargement…</div>

  <!-- =================================================================
       Écran de sélection du rôle
       ================================================================= -->
  <div v-if="view === 'role-select'" class="role-screen">
    <h1>Courses & Préférences</h1>
    <p>Qui es-tu ?</p>
    <div class="role-buttons">
      <button class="role-button role-button-comfort" @click="chooseRoleWithComfort">👁️ Consommateur — mode confort</button>
      <button class="role-button" @click="chooseRole('consommateur')">🍽️ Consommateur</button>
      <button class="role-button acheteur" @click="chooseRole('acheteur')">🛒 Acheteur</button>
    </div>
  </div>

  <!-- =================================================================
       Écran de saisie du code PIN
       ================================================================= -->
  <div v-if="view === 'pin'" class="pin-screen">
    <button class="pin-back link-btn" @click="backToRoleSelect">&larr; Retour</button>
    <h2>{{ pendingRole === 'consommateur' ? '🍽️ Consommateur' : '🛒 Acheteur' }}</h2>
    <div class="pin-dots">
      <div
        class="pin-dot"
        v-for="i in pinLength"
        :key="i"
        :class="{ filled: pinInput.length >= i }"
      ></div>
    </div>
    <div class="pin-error">{{ pinError }}</div>
    <div class="pin-keypad">
      <button class="pin-key" v-for="n in [1,2,3,4,5,6,7,8,9]" :key="n" @click="pressPinKey(String(n))">{{ n }}</button>
      <div class="pin-key empty"></div>
      <button class="pin-key" @click="pressPinKey('0')">0</button>
      <button class="pin-key" @click="pressPinBackspace" aria-label="Effacer le dernier chiffre">⌫</button>
    </div>
  </div>

  <!-- =================================================================
       Application principale (une fois connecté)
       ================================================================= -->
  <template v-if="view === 'categories' || view === 'category-detail' || view === 'shopping-list'">

    <div class="top-bar">
      <button v-if="view === 'category-detail'" class="top-bar-btn" @click="goToCategories" aria-label="Retour aux catégories">&larr;</button>
      <h1>
        <template v-if="view === 'category-detail' && currentCategory">{{ currentCategory.name }}</template>
        <template v-else-if="view === 'shopping-list'">Liste de courses</template>
        <template v-else>Catégories</template>
      </h1>
      <span class="role-badge">{{ role === 'consommateur' ? '🍽️ Consommateur' : '🛒 Acheteur' }}</span>
      <button class="top-bar-btn" @click="doLogout">Déconnexion</button>
    </div>

    <div v-if="selectionMode" class="selection-banner">
      🛒 Touche une photo pour l'ajouter à la liste
      <button @click="exitSelectionMode">Terminer</button>
    </div>

    <div v-if="errorMessage" class="banner error">{{ errorMessage }}</div>
    <div v-if="successMessage" class="banner success">{{ successMessage }}</div>

    <!-- ---------------- Vue : liste des catégories (mode confort) ---------------- -->
    <div v-if="view === 'categories' && a11yOn" class="view">
      <button type="button" class="a11y-manage-btn" @click="openManageCategories">⚙️ Gérer les catégories</button>
      <button v-if="role === 'consommateur'" type="button" class="a11y-manage-btn" @click="openSettings">⚙️ Réglages</button>

      <p v-if="loadingCategories" class="empty-hint" role="status">Chargement des catégories…</p>
      <ul v-else class="a11y-category-grid" role="list">
        <li v-for="cat in categories" :key="cat.id">
          <button
            type="button"
            class="a11y-category-card"
            @click="openCategory(cat)"
            :aria-label="cat.name + ', ' + cat.photo_count + ' photo' + (cat.photo_count !== 1 ? 's' : '')"
          >
            <span class="a11y-category-icon" aria-hidden="true">{{ categoryIcon(cat.name) }}</span>
            <span class="a11y-category-name" aria-hidden="true">{{ cat.name }}</span>
            <span class="a11y-category-count" aria-hidden="true">{{ cat.photo_count }} photo{{ cat.photo_count !== 1 ? 's' : '' }}</span>
          </button>
        </li>
      </ul>

      <button type="button" class="a11y-primary-btn" @click="openAddPhotoModal(null)">
        <span aria-hidden="true">+</span> Ajouter une photo
      </button>
    </div>

    <!-- ---------------- Vue : liste des catégories ---------------- -->
    <div v-if="view === 'categories' && !a11yOn" class="view">
      <button class="top-bar-btn" style="margin-bottom:14px;background:#e2e1da;color:#22271f" @click="openManageCategories">⚙️ Gérer les catégories</button>
      <button v-if="role === 'consommateur'" class="top-bar-btn" style="margin-bottom:14px;background:#e2e1da;color:#22271f" @click="openSettings">⚙️ Réglages</button>

      <div v-if="loadingCategories" class="empty-hint">Chargement des catégories…</div>
      <div v-else class="category-grid">
        <button
          v-for="cat in categories"
          :key="cat.id"
          class="category-card"
          @click="openCategory(cat)"
        >
          <span class="category-icon">{{ categoryIcon(cat.name) }}</span>
          <span class="category-name">{{ cat.name }}</span>
        </button>
      </div>

      <button class="fab" @click="openAddPhotoModal(null)" aria-label="Ajouter une photo">+</button>
    </div>

    <!-- ---------------- Vue : détail d'une catégorie (mode confort) ---------------- -->
    <div v-if="view === 'category-detail' && a11yOn" class="view">
      <p v-if="loadingPhotos" class="empty-hint" role="status">Chargement des photos…</p>

      <template v-else>
        <div class="a11y-tablist" role="tablist" aria-label="Filtrer les photos">
          <button
            id="a11y-tab-ranked"
            type="button"
            role="tab"
            class="a11y-tab"
            :class="{ active: a11yActiveTab === 'ranked' }"
            :aria-selected="a11yActiveTab === 'ranked'"
            aria-controls="a11y-tabpanel-ranked"
            @click="setA11yTab('ranked')"
          >
            <span aria-hidden="true">★</span> Classement <span class="a11y-tab-count">{{ rankedPhotos.length }}</span>
          </button>
          <button
            id="a11y-tab-unranked"
            type="button"
            role="tab"
            class="a11y-tab"
            :class="{ active: a11yActiveTab === 'unranked' }"
            :aria-selected="a11yActiveTab === 'unranked'"
            aria-controls="a11y-tabpanel-unranked"
            @click="setA11yTab('unranked')"
          >
            <span aria-hidden="true">◇</span> À évaluer <span class="a11y-tab-count">{{ unrankedPhotos.length }}</span>
          </button>
        </div>

        <div
          v-if="a11yActiveTab === 'ranked'"
          id="a11y-tabpanel-ranked"
          role="tabpanel"
          aria-labelledby="a11y-tab-ranked"
        >
          <p v-if="rankedPhotos.length === 0" class="empty-hint">Aucune photo classée pour le moment.</p>
          <ul v-else ref="rankedList" class="a11y-photo-list" role="list">
            <li
              v-for="(photo, index) in rankedPhotos"
              :key="photo.id"
              :data-id="photo.id"
              class="a11y-photo-card"
              :class="{ draggable: role === 'consommateur' }"
            >
              <button type="button" class="a11y-thumb-btn" @click="onPhotoThumbClick(photo)" :aria-label="photoThumbLabel(photo)">
                <img class="a11y-photo-thumb" :src="photoUrl(photo)" :alt="photo.product_name" />
                <span class="a11y-photo-rank" aria-hidden="true">{{ index + 1 }}</span>
              </button>
              <div class="a11y-photo-info">
                <p class="a11y-photo-name">
                  {{ photo.product_name }}
                  <span v-if="index === 0" class="a11y-badge-preferred">★ Préféré</span>
                </p>
                <p class="a11y-photo-author">Ajouté par {{ photo.uploaded_by }}</p>
                <button type="button" class="a11y-link-btn" @click="toggleComments(photo)">
                  💬 {{ photo.comments.length }} commentaire{{ photo.comments.length !== 1 ? 's' : '' }}
                </button>
                <div v-if="openCommentsFor === photo.id" class="comments-box">
                  <div v-for="c in photo.comments" :key="c.id" class="comment-item">
                    <span class="comment-author">{{ c.author }} :</span> {{ c.text }}
                  </div>
                  <div class="comment-form">
                    <label class="sr-only" :for="'a11y-comment-' + photo.id">Ajouter un commentaire pour {{ photo.product_name }}</label>
                    <input
                      :id="'a11y-comment-' + photo.id"
                      type="text"
                      v-model="newCommentDrafts[photo.id]"
                      placeholder="Ajouter un commentaire…"
                      @keyup.enter="submitComment(photo)"
                    />
                    <button @click="submitComment(photo)">Envoyer</button>
                  </div>
                </div>
              </div>
              <button
                v-if="role === 'consommateur'"
                class="a11y-delete-btn"
                @click="confirmDeletePhoto(photo)"
                aria-label="Supprimer la photo"
              >
                🗑️
              </button>
            </li>
          </ul>
        </div>

        <div
          v-if="a11yActiveTab === 'unranked'"
          id="a11y-tabpanel-unranked"
          role="tabpanel"
          aria-labelledby="a11y-tab-unranked"
        >
          <p v-if="unrankedPhotos.length === 0" class="empty-hint">Aucune photo à évaluer pour le moment.</p>
          <ul v-else class="a11y-photo-list" role="list">
            <li v-for="photo in unrankedPhotos" :key="photo.id" class="a11y-photo-card">
              <button type="button" class="a11y-thumb-btn" @click="onPhotoThumbClick(photo)" :aria-label="photoThumbLabel(photo)">
                <img class="a11y-photo-thumb" :src="photoUrl(photo)" :alt="photo.product_name" />
              </button>
              <div class="a11y-photo-info">
                <p class="a11y-photo-name">{{ photo.product_name }}</p>
                <p class="a11y-photo-author">Proposé par {{ photo.uploaded_by }}</p>
                <button type="button" class="a11y-link-btn" @click="toggleComments(photo)">
                  💬 {{ photo.comments.length }} commentaire{{ photo.comments.length !== 1 ? 's' : '' }}
                </button>
                <div v-if="openCommentsFor === photo.id" class="comments-box">
                  <div v-for="c in photo.comments" :key="c.id" class="comment-item">
                    <span class="comment-author">{{ c.author }} :</span> {{ c.text }}
                  </div>
                  <div class="comment-form">
                    <label class="sr-only" :for="'a11y-comment-u-' + photo.id">Ajouter un commentaire pour {{ photo.product_name }}</label>
                    <input
                      :id="'a11y-comment-u-' + photo.id"
                      type="text"
                      v-model="newCommentDrafts[photo.id]"
                      placeholder="Ajouter un commentaire…"
                      @keyup.enter="submitComment(photo)"
                    />
                    <button @click="submitComment(photo)">Envoyer</button>
                  </div>
                </div>
                <button
                  v-if="role === 'consommateur'"
                  type="button"
                  class="a11y-secondary-btn"
                  @click="rankPhotoFromUnranked(photo)"
                >
                  ★ Classer cette photo
                </button>
              </div>
              <button
                v-if="role === 'consommateur'"
                class="a11y-delete-btn"
                @click="confirmDeletePhoto(photo)"
                aria-label="Supprimer la photo"
              >
                🗑️
              </button>
            </li>
          </ul>
        </div>
      </template>

      <button type="button" class="a11y-primary-btn" @click="openAddPhotoModal(currentCategory)">
        <span aria-hidden="true">+</span> Ajouter une photo
      </button>
    </div>

    <!-- ---------------- Vue : détail d'une catégorie ---------------- -->
    <div v-if="view === 'category-detail' && !a11yOn" class="view">
      <div v-if="loadingPhotos" class="empty-hint">Chargement des photos…</div>

      <template v-else>
        <div class="section-title">Classement</div>
        <div v-if="rankedPhotos.length === 0" class="empty-hint">Aucune photo classée pour le moment.</div>
        <div ref="rankedList" class="photo-list">
          <div
            v-for="(photo, index) in rankedPhotos"
            :key="photo.id"
            :data-id="photo.id"
            class="photo-card"
            :class="{ draggable: role === 'consommateur' }"
          >
            <button type="button" class="thumb-btn" @click="onPhotoThumbClick(photo)" :aria-label="photoThumbLabel(photo)">
              <img class="photo-thumb" :src="photoUrl(photo)" :alt="photo.product_name" />
            </button>
            <div class="photo-info">
              <div class="photo-name-row">
                <span class="photo-rank">{{ index + 1 }}</span>
                <span class="photo-name">{{ photo.product_name }}</span>
                <span v-if="index === 0" class="badge-preferred">Préféré</span>
              </div>
              <div class="photo-author">Ajouté par {{ photo.uploaded_by }}</div>
              <div class="photo-actions">
                <button class="link-btn" @click="toggleComments(photo)">
                  💬 {{ photo.comments.length }}
                </button>
              </div>

              <div v-if="openCommentsFor === photo.id" class="comments-box">
                <div v-for="c in photo.comments" :key="c.id" class="comment-item">
                  <span class="comment-author">{{ c.author }} :</span> {{ c.text }}
                </div>
                <div class="comment-form">
                  <input
                    type="text"
                    v-model="newCommentDrafts[photo.id]"
                    placeholder="Ajouter un commentaire…"
                    @keyup.enter="submitComment(photo)"
                  />
                  <button @click="submitComment(photo)">Envoyer</button>
                </div>
              </div>
            </div>
            <button
              v-if="role === 'consommateur'"
              class="delete-photo-btn"
              @click="confirmDeletePhoto(photo)"
              aria-label="Supprimer la photo"
            >
              🗑️
            </button>
          </div>
        </div>

        <div class="section-title">À évaluer</div>
        <div v-if="unrankedPhotos.length === 0" class="empty-hint">Aucune photo à évaluer pour le moment.</div>
        <div ref="unrankedList" class="photo-list">
          <div
            v-for="photo in unrankedPhotos"
            :key="photo.id"
            :data-id="photo.id"
            class="photo-card"
            :class="{ draggable: role === 'consommateur' }"
          >
            <button type="button" class="thumb-btn" @click="onPhotoThumbClick(photo)" :aria-label="photoThumbLabel(photo)">
              <img class="photo-thumb" :src="photoUrl(photo)" :alt="photo.product_name" />
            </button>
            <div class="photo-info">
              <div class="photo-name-row">
                <span class="photo-name">{{ photo.product_name }}</span>
              </div>
              <div class="photo-author">Proposé par {{ photo.uploaded_by }}</div>
              <div class="photo-actions">
                <button class="link-btn" @click="toggleComments(photo)">
                  💬 {{ photo.comments.length }}
                </button>
              </div>
              <div v-if="openCommentsFor === photo.id" class="comments-box">
                <div v-for="c in photo.comments" :key="c.id" class="comment-item">
                  <span class="comment-author">{{ c.author }} :</span> {{ c.text }}
                </div>
                <div class="comment-form">
                  <input
                    type="text"
                    v-model="newCommentDrafts[photo.id]"
                    placeholder="Ajouter un commentaire…"
                    @keyup.enter="submitComment(photo)"
                  />
                  <button @click="submitComment(photo)">Envoyer</button>
                </div>
              </div>
            </div>
            <button
              v-if="role === 'consommateur'"
              class="delete-photo-btn"
              @click="confirmDeletePhoto(photo)"
              aria-label="Supprimer la photo"
            >
              🗑️
            </button>
          </div>
        </div>
        <p v-if="role === 'consommateur' && unrankedPhotos.length > 0" class="empty-hint">Glisse une photo vers "Classement" pour lui donner un rang.</p>
      </template>

      <button class="fab" @click="openAddPhotoModal(currentCategory)" aria-label="Ajouter une photo">+</button>
    </div>

    <!-- ---------------- Vue : liste de courses (mode confort) ---------------- -->
    <div v-if="view === 'shopping-list' && a11yOn" class="view">
      <p v-if="loadingShoppingList" class="empty-hint" role="status">Chargement de la liste…</p>

      <template v-else>
        <p v-if="!shoppingList" class="empty-hint">
          Le consommateur n'a pas encore créé de liste de courses.
        </p>

        <template v-else>
          <p v-if="shoppingListItems.length === 0" class="empty-hint">
            La liste est vide pour le moment.
          </p>

          <ul class="a11y-shopping-list" role="list">
            <li
              v-for="item in shoppingListItems"
              :key="item.id"
              class="a11y-shopping-item"
              :class="{ taken: item.taken }"
            >
              <div class="a11y-shopping-item-main">
                <button
                  v-if="item.photos"
                  type="button"
                  class="a11y-thumb-btn"
                  @click="openLightbox({ ...item.photos, product_name: item.label })"
                  :aria-label="`Voir la photo de ${item.label} en grand`"
                >
                  <img class="a11y-shopping-item-thumb" :src="photoUrl(item.photos)" :alt="item.label" />
                  <span v-if="item.taken" class="a11y-taken-overlay" aria-hidden="true">✓</span>
                </button>
                <div v-else class="a11y-shopping-item-thumb a11y-shopping-item-thumb-placeholder" aria-hidden="true">📝</div>

                <button
                  v-if="role === 'acheteur'"
                  type="button"
                  class="a11y-shopping-item-info"
                  @click="toggleItemTaken(item)"
                  :aria-pressed="item.taken"
                >
                  <span class="a11y-shopping-item-name">
                    {{ item.label }}
                    <span v-if="item.taken" class="a11y-badge-taken">PRIS</span>
                  </span>
                  <span class="a11y-shopping-item-category">{{ item.categories ? item.categories.name : '' }}</span>
                </button>
                <div v-else class="a11y-shopping-item-info">
                  <p class="a11y-shopping-item-name">
                    {{ item.label }}
                    <span v-if="item.taken" class="a11y-badge-taken">PRIS</span>
                  </p>
                  <p class="a11y-shopping-item-category">{{ item.categories ? item.categories.name : '' }}</p>
                </div>

                <p class="a11y-shopping-item-qty-readonly" v-if="role !== 'consommateur'">× {{ item.quantity }}</p>

                <button
                  v-if="role === 'consommateur'"
                  class="a11y-delete-btn"
                  @click="deleteListItem(item)"
                  aria-label="Retirer de la liste"
                >
                  🗑️
                </button>
              </div>

              <div class="a11y-stepper" v-if="role === 'consommateur'">
                <button type="button" class="a11y-stepper-btn" :disabled="item.quantity <= 1" @click="decrementItem(item)" aria-label="Diminuer la quantité">−</button>
                <output class="a11y-stepper-value">{{ item.quantity }} unité{{ item.quantity !== 1 ? 's' : '' }}</output>
                <button type="button" class="a11y-stepper-btn" @click="incrementItem(item)" aria-label="Augmenter la quantité">+</button>
              </div>
            </li>
          </ul>

          <template v-if="role === 'consommateur'">
            <button type="button" class="a11y-secondary-btn" @click="enterSelectionMode">📷 Ajouter depuis les catégories</button>
            <button type="button" class="a11y-secondary-btn" @click="openAddTextItemModal">✏️ Ajouter un article texte</button>
            <button
              v-if="shoppingListItems.length > 0"
              type="button"
              class="a11y-primary-btn a11y-danger-btn"
              @click="confirmTerminerListe"
            >
              ✅ Terminer les courses
            </button>
          </template>
        </template>
      </template>
    </div>

    <!-- ---------------- Vue : liste de courses ---------------- -->
    <div v-if="view === 'shopping-list' && !a11yOn" class="view">
      <div v-if="loadingShoppingList" class="empty-hint">Chargement de la liste…</div>

      <template v-else>
        <div v-if="!shoppingList" class="empty-hint">
          Le consommateur n'a pas encore créé de liste de courses.
        </div>

        <template v-else>
          <div v-if="shoppingListItems.length === 0" class="empty-hint">
            La liste est vide pour le moment.
          </div>

          <div class="shopping-item-list">
            <div
              v-for="item in shoppingListItems"
              :key="item.id"
              class="shopping-item"
              :class="{ taken: item.taken }"
            >
              <button
                v-if="item.photos"
                type="button"
                class="thumb-btn"
                @click="openLightbox({ ...item.photos, product_name: item.label })"
                :aria-label="`Voir la photo de ${item.label} en grand`"
              >
                <img class="shopping-item-thumb" :src="photoUrl(item.photos)" :alt="item.label" />
              </button>
              <div v-else class="shopping-item-thumb shopping-item-thumb-placeholder">📝</div>

              <button
                v-if="role === 'acheteur'"
                type="button"
                class="shopping-item-info tappable"
                @click="toggleItemTaken(item)"
                :aria-pressed="item.taken"
              >
                <span class="shopping-item-name">{{ item.label }}</span>
                <span class="shopping-item-category">{{ item.categories ? item.categories.name : '' }}</span>
              </button>
              <div v-else class="shopping-item-info">
                <div class="shopping-item-name">{{ item.label }}</div>
                <div class="shopping-item-category">{{ item.categories ? item.categories.name : '' }}</div>
              </div>

              <div class="shopping-item-qty" v-if="role === 'consommateur'">
                <button class="qty-btn" :disabled="item.quantity <= 1" @click="decrementItem(item)">−</button>
                <span>{{ item.quantity }}</span>
                <button class="qty-btn" @click="incrementItem(item)">+</button>
              </div>
              <div class="shopping-item-qty-readonly" v-else>× {{ item.quantity }}</div>

              <button
                v-if="role === 'consommateur'"
                class="delete-photo-btn"
                @click="deleteListItem(item)"
                aria-label="Retirer de la liste"
              >
                🗑️
              </button>
            </div>
          </div>

          <template v-if="role === 'consommateur'">
            <button class="secondary-btn" @click="enterSelectionMode">📷 Ajouter depuis les catégories</button>
            <button class="secondary-btn" @click="openAddTextItemModal">✏️ Ajouter un article texte</button>
            <button
              v-if="shoppingListItems.length > 0"
              class="secondary-btn danger-btn"
              @click="confirmTerminerListe"
            >
              ✅ Terminer les courses
            </button>
          </template>
        </template>
      </template>
    </div>

    <!-- ---------------- Navigation basse ---------------- -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <button
        class="bottom-nav-btn"
        :class="{ active: view === 'categories' || view === 'category-detail' }"
        :aria-current="(view === 'categories' || view === 'category-detail') ? 'page' : undefined"
        @click="goToCategories"
      >
        📂 Catégories
      </button>
      <button
        class="bottom-nav-btn"
        :class="{ active: view === 'shopping-list' }"
        :aria-current="view === 'shopping-list' ? 'page' : undefined"
        @click="openShoppingList"
      >
        🛒 Liste<span v-if="shoppingListPendingCount > 0"> ({{ shoppingListPendingCount }})</span>
      </button>
    </nav>
  </template>

  <!-- =================================================================
       Écran Réglages (consommateur uniquement)
       ================================================================= -->
  <template v-if="view === 'settings'">
    <div class="top-bar">
      <button class="top-bar-btn" @click="goToCategories" aria-label="Retour aux catégories">&larr;</button>
      <h1>Réglages</h1>
      <span class="role-badge">🍽️ Consommateur</span>
      <button class="top-bar-btn" @click="doLogout">Déconnexion</button>
    </div>

    <div class="view settings-view">
      <section class="settings-section">
        <div class="settings-row">
          <div>
            <p class="settings-label">Confort visuel</p>
            <p class="settings-hint">Contraste élevé, gros caractères, cibles larges.</p>
          </div>
          <button
            type="button"
            class="settings-toggle"
            :class="{ on: a11yOn }"
            :aria-pressed="a11yOn"
            @click="toggleA11yMode"
          >
            {{ a11yOn ? 'ON' : 'OFF' }}
          </button>
        </div>
      </section>

      <template v-if="a11yOn">
        <section class="settings-section">
          <p class="settings-label">Taille du texte</p>
          <div class="settings-choice-group" role="radiogroup" aria-label="Taille du texte">
            <button
              type="button"
              class="settings-choice"
              :class="{ active: a11yTextSize === 'normal' }"
              :aria-pressed="a11yTextSize === 'normal'"
              @click="setA11yTextSize('normal')"
            >
              A Normal
            </button>
            <button
              type="button"
              class="settings-choice"
              :class="{ active: a11yTextSize === 'large' }"
              :aria-pressed="a11yTextSize === 'large'"
              @click="setA11yTextSize('large')"
            >
              A Grand
            </button>
            <button
              type="button"
              class="settings-choice"
              :class="{ active: a11yTextSize === 'xl' }"
              :aria-pressed="a11yTextSize === 'xl'"
              @click="setA11yTextSize('xl')"
            >
              A Très grand
            </button>
          </div>
        </section>

        <section class="settings-section">
          <p class="settings-label">Thème</p>
          <div class="settings-choice-group" role="radiogroup" aria-label="Thème">
            <button
              type="button"
              class="settings-choice"
              :class="{ active: a11yTheme === 'light' }"
              :aria-pressed="a11yTheme === 'light'"
              @click="setA11yTheme('light')"
            >
              Clair
            </button>
            <button
              type="button"
              class="settings-choice"
              :class="{ active: a11yTheme === 'dark' }"
              :aria-pressed="a11yTheme === 'dark'"
              @click="setA11yTheme('dark')"
            >
              Sombre
            </button>
          </div>
        </section>

        <section class="settings-section">
          <p class="settings-label">Feedback</p>
          <div class="settings-row">
            <p>Vibration</p>
            <button
              type="button"
              class="settings-toggle"
              :class="{ on: a11yVibrate }"
              :aria-pressed="a11yVibrate"
              @click="toggleA11yVibrate"
            >
              {{ a11yVibrate ? 'ON' : 'OFF' }}
            </button>
          </div>
          <div class="settings-row">
            <p>Son de confirmation</p>
            <button
              type="button"
              class="settings-toggle"
              :class="{ on: a11ySound }"
              :aria-pressed="a11ySound"
              @click="toggleA11ySound"
            >
              {{ a11ySound ? 'ON' : 'OFF' }}
            </button>
          </div>
        </section>
      </template>
    </div>
  </template>

  <!-- =================================================================
       Modale : ajout d'une photo (mode confort)
       ================================================================= -->
  <div v-if="showAddPhotoModal && a11yOn" class="modal-overlay" @click.self="closeAddPhotoModal">
    <div class="modal-sheet a11y-modal-sheet">
      <button type="button" class="a11y-modal-close" @click="closeAddPhotoModal" aria-label="Fermer">✕</button>
      <p class="a11y-modal-eyebrow">Nouvelle photo</p>
      <h2>Ajouter</h2>

      <div class="a11y-form-field">
        <label for="a11y-add-photo-category">Catégorie</label>
        <select id="a11y-add-photo-category" class="a11y-select" v-model="addPhotoCategoryId">
          <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</option>
        </select>
      </div>

      <div class="a11y-capture-buttons">
        <label class="a11y-capture-btn">
          <input type="file" accept="image/*" capture="environment" @change="onPhotoFileSelected" />
          <span class="a11y-capture-icon" aria-hidden="true">📷</span>
          <span class="a11y-capture-text">
            <span class="a11y-capture-label">Prendre une photo</span>
            <span class="a11y-capture-hint">Ouvre l'appareil photo</span>
          </span>
        </label>
        <label class="a11y-capture-btn">
          <input type="file" accept="image/*" @change="onPhotoFileSelected" />
          <span class="a11y-capture-icon" aria-hidden="true">🖼️</span>
          <span class="a11y-capture-text">
            <span class="a11y-capture-label">Depuis la galerie</span>
            <span class="a11y-capture-hint">Choisir une image existante</span>
          </span>
        </label>
      </div>

      <img v-if="addPhotoPreviewUrl" class="a11y-image-preview" :src="addPhotoPreviewUrl" alt="Aperçu" />

      <div class="a11y-form-field">
        <label for="a11y-add-photo-product-name">Nom du produit</label>
        <input id="a11y-add-photo-product-name" type="text" class="a11y-input" v-model="addPhotoProductName" placeholder="Ex : Yaourt nature Danone" />
      </div>

      <button type="button" class="a11y-primary-btn" :disabled="!canSubmitPhoto || uploading" @click="submitAddPhoto">
        <span v-if="uploading" class="spinner"></span>{{ uploading ? 'Envoi en cours…' : 'Ajouter' }}
      </button>
      <button type="button" class="a11y-secondary-btn" @click="closeAddPhotoModal">Terminé</button>
    </div>
  </div>

  <!-- =================================================================
       Modale : ajout d'une photo
       ================================================================= -->
  <div v-if="showAddPhotoModal && !a11yOn" class="modal-overlay" @click.self="closeAddPhotoModal">
    <div class="modal-sheet">
      <button class="modal-close" @click="closeAddPhotoModal" aria-label="Fermer">✕</button>
      <h2>Ajouter une photo</h2>

      <div class="form-field">
        <label for="add-photo-category">Catégorie</label>
        <select id="add-photo-category" v-model="addPhotoCategoryId">
          <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</option>
        </select>
      </div>

      <div class="capture-buttons">
        <label>
          📷 Prendre une photo
          <input type="file" accept="image/*" capture="environment" @change="onPhotoFileSelected" />
        </label>
        <label>
          🖼️ Depuis la galerie
          <input type="file" accept="image/*" @change="onPhotoFileSelected" />
        </label>
      </div>

      <img v-if="addPhotoPreviewUrl" class="image-preview" :src="addPhotoPreviewUrl" alt="Aperçu" />

      <div class="form-field">
        <label for="add-photo-product-name">Nom du produit</label>
        <input id="add-photo-product-name" type="text" v-model="addPhotoProductName" placeholder="Ex : Yaourt nature Danone" />
      </div>

      <button class="primary-btn" :disabled="!canSubmitPhoto || uploading" @click="submitAddPhoto">
        <span v-if="uploading" class="spinner"></span>{{ uploading ? 'Envoi en cours…' : 'Ajouter' }}
      </button>
      <button class="secondary-btn" @click="closeAddPhotoModal">Terminé</button>
    </div>
  </div>

  <!-- =================================================================
       Modale : ajout d'un article texte à la liste de courses
       ================================================================= -->
  <div v-if="showAddTextItemModal" class="modal-overlay" @click.self="showAddTextItemModal = false">
    <div class="modal-sheet">
      <button class="modal-close" @click="showAddTextItemModal = false" aria-label="Fermer">✕</button>
      <h2>Ajouter un article texte</h2>

      <div class="form-field">
        <label for="add-text-item-category">Catégorie</label>
        <select id="add-text-item-category" v-model="addTextItemCategoryId">
          <option v-for="cat in categories" :key="cat.id" :value="cat.id">{{ cat.name }}</option>
        </select>
      </div>

      <div class="form-field">
        <label for="add-text-item-label">Nom de l'article</label>
        <input
          id="add-text-item-label"
          type="text"
          v-model="addTextItemLabel"
          placeholder="Ex : Papier toilette"
          @keyup.enter="submitAddTextItem"
        />
      </div>

      <button
        class="primary-btn"
        :disabled="!addTextItemLabel.trim() || !addTextItemCategoryId"
        @click="submitAddTextItem"
      >
        Ajouter
      </button>
    </div>
  </div>

  <!-- =================================================================
       Modale : gestion des catégories
       ================================================================= -->
  <div v-if="showManageCategories" class="modal-overlay" @click.self="showManageCategories = false">
    <div class="modal-sheet">
      <button class="modal-close" @click="showManageCategories = false" aria-label="Fermer">✕</button>
      <h2>Gérer les catégories</h2>

      <div v-for="cat in categories" :key="cat.id" class="category-manage-row">
        <label class="sr-only" :for="'category-name-' + cat.id">Nom de la catégorie</label>
        <input type="text" :id="'category-name-' + cat.id" v-model="categoryEdits[cat.id]" />
        <button class="icon-btn" @click="saveRenameCategory(cat)" :aria-label="'Enregistrer le nom de ' + cat.name">💾</button>
        <button class="icon-btn danger" @click="confirmDeleteCategory(cat)" :aria-label="'Supprimer la catégorie ' + cat.name">🗑️</button>
      </div>

      <div class="add-category-row">
        <label class="sr-only" for="new-category-name">Nouvelle catégorie</label>
        <input type="text" id="new-category-name" v-model="newCategoryName" placeholder="Nouvelle catégorie…" @keyup.enter="submitAddCategory" />
        <button class="icon-btn" @click="submitAddCategory" aria-label="Ajouter la catégorie">➕</button>
      </div>
    </div>
  </div>

  <!-- =================================================================
       ConfirmSheet (remplace window.confirm())
       ================================================================= -->
  <div
    v-if="confirmSheet.open"
    class="modal-overlay"
    @click.self="closeConfirmSheet"
    @keydown="onConfirmSheetKeydown"
  >
    <div
      class="modal-sheet"
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="confirm-sheet-title"
      aria-describedby="confirm-sheet-message"
    >
      <p class="confirm-sheet-icon" aria-hidden="true">!</p>
      <h2 id="confirm-sheet-title">{{ confirmSheet.title }}</h2>
      <p id="confirm-sheet-message">{{ confirmSheet.message }}</p>
      <button id="confirm-sheet-confirm" type="button" class="primary-btn confirm-sheet-danger-btn" @click="confirmSheetConfirm">
        {{ confirmSheet.confirmLabel }}
      </button>
      <button id="confirm-sheet-cancel" type="button" class="secondary-btn" @click="closeConfirmSheet">
        Annuler
      </button>
    </div>
  </div>

  <!-- =================================================================
       Lightbox (photo en plein écran)
       ================================================================= -->
  <div v-if="lightboxPhoto" class="lightbox" @click.self="closeLightbox">
    <button class="lightbox-close" @click="closeLightbox" aria-label="Fermer l'aperçu">✕</button>
    <img :src="photoUrl(lightboxPhoto)" :alt="lightboxPhoto.product_name" />
  </div>

</div>

<!-- =================================================================
     Bibliothèques externes (via CDN, sans étape de build)
     ================================================================= -->
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>

<!-- =================================================================
     Code de l'application
     ================================================================= -->
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/image-utils.js"></script>
<script src="js/api.js"></script>
<script src="js/a11y.js"></script>
<script src="js/announce.js"></script>
<script src="js/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {
        // L'échec d'enregistrement du service worker n'empêche pas l'app de fonctionner.
      });
    });
  }
</script>

</body>
</html>
